<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Certificado - Europe Certifications</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --blue-dark: #002b7f;
            --blue-bright: #0044cc;
            --gold: #d4af37;
            --text-dark: #1a202c;
            --text-muted: #4a5568;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #e2e8f0;
            margin: 0;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Envoltorio Responsive */
        .cert-wrapper {
            width: 100%;
            max-width: 900px;
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            transform-origin: top center;
        }

        /* El Certificado Físico */
        .certificate {
            width: 900px;
            height: 650px;
            background-color: #ffffff;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Sombras grises diagonales de fondo */
        .bg-shape-1 {
            position: absolute;
            bottom: -20%; right: -10%;
            width: 70%; height: 70%;
            background-color: #f7fafc;
            transform: rotate(-35deg);
            z-index: 1;
        }
        .bg-shape-2 {
            position: absolute;
            bottom: -30%; right: -20%;
            width: 70%; height: 70%;
            background-color: #edf2f7;
            transform: rotate(-35deg);
            z-index: 0;
        }

        /* Formas de la esquina superior izquierda */
        .shape-gold-wide {
            position: absolute;
            top: 0; left: 0;
            width: 55%; height: 100%;
            background-color: var(--gold);
            clip-path: polygon(0 0, 100% 0, 0 100%);
            z-index: 2;
        }
        .shape-blue-dark {
            position: absolute;
            top: 0; left: 0;
            width: 50%; height: 100%;
            background-color: var(--blue-dark);
            clip-path: polygon(0 0, 100% 0, 0 95%);
            z-index: 3;
        }
        .shape-blue-light {
            position: absolute;
            top: 0; left: 0;
            width: 40%; height: 100%;
            background-color: var(--blue-bright);
            clip-path: polygon(0 0, 100% 0, 0 75%);
            z-index: 4;
            opacity: 0.9;
        }
        .shape-blue-accent {
            position: absolute;
            top: 0; left: 0;
            width: 30%; height: 100%;
            background-color: #001a57;
            clip-path: polygon(0 0, 100% 0, 0 60%);
            z-index: 5;
        }

        /* Logo Falso */
        .cert-logo {
            position: absolute;
            top: 60px;
            left: 60px;
            width: 180px;
            height: 180px;
            z-index: 10;
            object-fit: contain;
        }

        /* Contenido del Certificado */
        .cert-content {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 20;
            padding: 70px 60px 60px 400px;
            display: flex;
            flex-direction: column;
        }

        .title {
            color: var(--blue-dark);
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: 4px;
            margin: 0 0 5px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        /* Tarjeta de Estado Flotante */
        .status-card {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 10px 15px rgba(0,0,0,0.05);
            display: none;
            margin-top: 1rem;
        }
        .status-card.valid {
            display: block;
            border-left: 6px solid #10b981;
            background-color: #ecfdf5;
        }
        .status-card.invalid {
            display: block;
            border-left: 6px solid #ef4444;
            background-color: #fef2f2;
        }
        
        /* Capa de Error visual sobre el certificado */
        .error-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            display: none;
        }
        .error-overlay h1 {
            color: #ef4444;
            font-size: 4rem;
            border: 8px solid #ef4444;
            padding: 1rem 2rem;
            transform: rotate(-15deg);
            text-transform: uppercase;
        }
        
        /* Tabla Profesional de Datos */
        .data-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }
        .data-row {
            display: grid;
            grid-template-columns: 200px 1fr;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 8px;
        }
        .data-label {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .data-value {
            font-size: 1.1rem;
            color: var(--blue-dark);
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="cert-wrapper" id="certWrapper">
        <div class="certificate" id="certificate">
            <div class="bg-shape-2"></div>
            <div class="bg-shape-1"></div>
            <div class="shape-gold-wide"></div>
            <div class="shape-blue-dark"></div>
            <div class="shape-blue-light"></div>
            <div class="shape-blue-accent"></div>
            <img class="cert-logo" src="logo.png" alt="Europe Certifications Logo">

            <div class="cert-content">
                <h1 class="title">CERTIFICADO</h1>
                <div id="val-lista" style="text-align: left; width: 100%;">
                    <div style="color: var(--blue-dark); font-weight: 600; font-size: 1.2rem; margin-top: 30px;">Cargando datos...</div>
                </div>
            </div>

            <div class="error-overlay" id="errorOverlay">
                <h1>INVÁLIDO</h1>
            </div>
        </div>
    </div>

    <div class="status-card" id="statusCard"></div>

    <script>
        function resizeCert() {
            const wrapper = document.getElementById('certWrapper');
            const cert = document.getElementById('certificate');
            const targetWidth = 900;
            const targetHeight = 650;
            const containerWidth = wrapper.parentElement.clientWidth - 32;
            
            if (containerWidth < targetWidth) {
                const scale = containerWidth / targetWidth;
                cert.style.transform = 'scale(' + scale + ')';
                wrapper.style.height = (targetHeight * scale) + 'px';
            } else {
                cert.style.transform = 'scale(1)';
                wrapper.style.height = targetHeight + 'px';
            }
        }
        window.addEventListener('resize', resizeCert);
        window.addEventListener('load', resizeCert);

        const hash = window.location.hash.substring(1); 
        const statusCard = document.getElementById('statusCard');
        const errorOverlay = document.getElementById('errorOverlay');

        if (hash) {
            try {
                const b64 = decodeURIComponent(hash);
                const datosPuros = decodeURIComponent(escape(window.atob(b64)));
                const partes = datosPuros.split('|');
                
                if (partes.length < 10) throw new Error("Faltan datos");

                const [org_cert, org_acred, num_cert, empresa, norma, curso, fechaRegQR, fechaVenQR, duracion, codigo] = partes;

                const [d, m, y] = fechaVenQR.split('/');
                const fechaVenc = new Date(`${y}-${m}-${d}T12:00:00Z`);
                const hoy = new Date();
                const diff = fechaVenc - hoy;
                const diasDinámicos = Math.ceil(diff / (1000 * 60 * 60 * 24));
                const estadoDinámico = diasDinámicos > 0 ? "ACTIVO" : "VENCIDO";

                const labels = [
                    "Organismo de Certificación",
                    "Organismo de Acreditación",
                    "Número de Certificado",
                    "Nombre de la Empresa",
                    "Norma de Certificación",
                    "Nombre del Curso",
                    "Fecha de Registro",
                    "Fecha de Vencimiento",
                    "Duración",
                    "Certificado",
                    "Dias por Vencer",
                    "Estado"
                ];
                
                const values = [
                    org_cert,
                    org_acred,
                    num_cert,
                    empresa,
                    norma,
                    curso,
                    fechaRegQR,
                    fechaVenQR,
                    duracion + " HORAS ACADEMICAS",
                    codigo,
                    diasDinámicos,
                    estadoDinámico
                ];

                let htmlFormat = '<div class="data-grid">';
                for(let i = 0; i < labels.length; i++) {
                    let clave = labels[i];
                    let valor = values[i];
                    let valorHtml = valor;

                    if (clave === 'Estado') {
                        const bg = valor === 'ACTIVO' ? '#ecfdf5' : '#fef2f2';
                        const col = valor === 'ACTIVO' ? '#10b981' : '#ef4444';
                        valorHtml = `<span style="background: ${bg}; color: ${col}; padding: 4px 12px; border-radius: 20px; font-size: 0.95rem; letter-spacing: 1px;">${valor}</span>`;
                    }

                    htmlFormat += `
                        <div class="data-row">
                            <div class="data-label">${clave}</div>
                            <div class="data-value">${valorHtml}</div>
                        </div>
                    `;
                }
                htmlFormat += '</div>';

                document.getElementById('val-lista').innerHTML = htmlFormat;

                statusCard.className = "status-card valid";
                statusCard.innerHTML = `
                    <div style="display:flex; align-items:center; justify-content:center; color:#10b981; margin-bottom:0.5rem;">
                        <span class="material-symbols-outlined" style="font-size:2rem; margin-right:8px;">verified</span>
                        <h2 style="margin:0; font-size:1.5rem;">Certificado Válido</h2>
                    </div>
                    <p style="margin:0; color:#4a5568;">La información en pantalla es oficial y auténtica.</p>
                `;

            } catch (e) {
                errorOverlay.style.display = "flex";
                
                statusCard.className = "status-card invalid";
                statusCard.innerHTML = `
                    <div style="display:flex; align-items:center; justify-content:center; color:#ef4444; margin-bottom:0.5rem;">
                        <span class="material-symbols-outlined" style="font-size:2rem; margin-right:8px;">error</span>
                        <h2 style="margin:0; font-size:1.5rem;">QR Inválido</h2>
                    </div>
                    <p style="margin:0; color:#4a5568;">El código está corrupto o ha sido alterado.</p>
                    <p style="margin-top:0.5rem; font-size:0.8rem; color:#e53e3e;">[ERROR TÉCNICO: ${e.message}]</p>
                `;
            }
        } else {
            statusCard.className = "status-card";
            statusCard.style.display = "block";
            statusCard.innerHTML = `
                <div style="display:flex; align-items:center; justify-content:center; color:#718096; margin-bottom:0.5rem;">
                    <span class="material-symbols-outlined" style="font-size:2rem; margin-right:8px;">qr_code_scanner</span>
                    <h2 style="margin:0; font-size:1.2rem;">Esperando escaneo</h2>
                </div>
                <p style="margin:0; color:#4a5568;">Por favor, escanea un código QR válido de un certificado.</p>
            `;
        }
    </script>
</body>
</html>
